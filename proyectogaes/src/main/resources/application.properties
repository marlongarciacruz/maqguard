# Nombre del proyecto para que Spring sepa cómo se llama esta app
spring.application.name=proyectogaes

# ── Configuración de la Base de Datos MySQL ──────────────────
# Aquí le doy la ruta de mi base de datos (se llama maqguard) y le paso unos parámetros 
# para que no moleste con el SSL o la zona horaria.
spring.datasource.url=jdbc:mysql://localhost:3306/maqguard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# El usuario de MySQL (por defecto es root) y la clave (que en mi caso está vacía)
spring.datasource.username=root
spring.datasource.password=

# El driver que sirve de puente entre Java y MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# El 'update' es clave: hace que Hibernate cree o actualice las tablas 
# automáticamente según mis clases @Entity sin borrar los datos que ya tengo.
spring.jpa.hibernate.ddl-auto=update

# Activo esto para que en la consola de Spring se vea el SQL real que se está ejecutando
spring.jpa.show-sql=true

# ── Thymeleaf ────────────────────────────────────────────────
# Desactivo el caché de las vistas para que, cuando haga un cambio en el HTML, 
# se vea reflejado al recargar la página sin tener que reiniciar todo el servidor.
spring.thymeleaf.cache=false