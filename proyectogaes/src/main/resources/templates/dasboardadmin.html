<!DOCTYPE html> 
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | MaqGuard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            height: 100vh;
            background-color: #0d1b2a;
            color: white;
        }
        .sidebar a, .sidebar button {
            color: white;
            text-decoration: none;
            width: 100%;
            text-align: left;
        }
        .sidebar a:hover, .sidebar button:hover {
            background-color: #0d6efd;
            color: white;
        }
        .content {
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="d-flex">

        <!-- SIDEBAR -->
        <nav class="sidebar p-3">
            <h4 class="text-center">MaqGuard Admin</h4>

            <ul class="nav flex-column mt-4">

                <li class="nav-item mb-2">
                    <a th:href="@{/inicio}" class="nav-link">Inicio</a>
                </li>

                <li class="nav-item mb-2">
                    <a th:href="@{/admin/usuarios}" class="nav-link">Gestión de Usuarios</a>
                </li>

                <li class="nav-item mb-2">
                    <a th:href="@{/admin/maquinas}" class="nav-link">Gestión de Máquinas</a>
                </li>

                <li class="nav-item mb-2">
                    <a th:href="@{/admin/reportes}" class="nav-link">Reportes</a>
                </li>

                <li class="nav-item mb-2">
                    <a th:href="@{/admin/configuracion}" class="nav-link">Configuración</a>
                </li>

                <!-- 🔥 LOGOUT CORRECTO -->
                <li class="nav-item mt-4">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="nav-link text-danger btn btn-link">
                            <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                        </button>
                    </form>
                </li>

            </ul>
        </nav>

        <!-- CONTENIDO -->
        <div class="content flex-grow-1">
            <h1>Bienvenido al Dashboard de Administración</h1>
            <p>Aquí puedes gestionar usuarios, máquinas, reportes y configuraciones del sistema.</p>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>     
</html>
