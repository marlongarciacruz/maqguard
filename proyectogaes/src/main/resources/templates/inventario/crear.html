<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nuevo Artículo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-hover .nav-link {
            transition: color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
        }

        .navbar-hover .nav-link:hover {
            color: #fff !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.1), 0 0 2px rgba(255, 255, 255, 0.5);
        }

        .navbar-hover .nav-link.active {
            color: #fff !important;
            font-weight: 600 !important;
        }

        /* --- NOTIFICACIONES --- */
        .badge-pulse {
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(220, 53, 69, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
            }
        }

        .notification-dropdown {
            width: 350px;
            padding: 0;
            border: none;
            overflow: hidden;
        }

        .notification-item {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            white-space: normal;
        }

        .notification-item:hover {
            background-color: #f8f9fa;
        }

        .notification-item.unread {
            background-color: #f0f8ff;
        }

        .noti-icon-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* --- DASHBOARD CARDS --- */
        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-5px);
            box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .15) !important;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .card-kpi {
            border-left: 5px solid transparent;
        }

        /* --- FOOTER --- */
        .hover-link {
            transition: all 0.3s ease;
            display: inline-block;
        }

        .hover-link:hover {
            color: #fff !important;
            transform: translateX(5px);
        }

        .hover-icon {
            transition: color 0.3s;
        }

        .hover-icon:hover {
            color: #0d6efd !important;
        }
    </style>

</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-lg">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0" th:text="${inventario.id_repuesto != null ? 'Editar Repuesto' : 'Registrar Repuesto'}">
                    Registrar Repuesto</h4>
            </div>

            <div class="card-body">
                <form th:action="@{/inventario/guardar}" th:object="${inventario}" method="post"
                    class="needs-validation" novalidate>

                    <input type="hidden" th:field="*{id_repuesto}">

                    <h6 class="fw-bold mb-3">Identificación</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-8">
                            <label class="form-label">Nombre del repuesto</label>
                            <input type="text" th:field="*{nombre}" class="form-control"
                                placeholder="Ej: Rodamiento industrial" required>
                            <div class="invalid-feedback">Por favor ingrese un nombre.</div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Código</label>
                            <input type="text" th:field="*{codigo_pieza}" class="form-control" placeholder="Ej: ROD-001"
                                required>
                            <div class="invalid-feedback">Código requerido.</div>
                        </div>
                    </div>

                    <h6 class="fw-bold mb-3">Control de Stock</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Cantidad</label>
                            <input type="number" th:field="*{cantidad}" class="form-control" min="0" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Stock mínimo</label>
                            <input type="number" th:field="*{stock_minimo}" class="form-control" min="0" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Ubicación almacén</label>
                            <input type="text" th:field="*{ubicacion_almacen}" class="form-control"
                                placeholder="Ej: Estante A3" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/inventario}" class="btn btn-secondary">Volver</a>
                        <button type="submit" class="btn btn-success px-5">
                            <i class="bi bi-save me-2"></i>
                            <span th:text="${inventario.id_repuesto != null ? 'Actualizar' : 'Guardar'}">Guardar</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
