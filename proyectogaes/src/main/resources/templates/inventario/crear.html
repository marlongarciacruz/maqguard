<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nuevo Artículo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container my-5">

        <nav class="mb-4">
            <a href="/inventario" class="text-decoration-none text-secondary">
                ← Volver a Inventario
            </a>
        </nav>

        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-white p-4">
                <h4 class="fw-bold">Registrar Nuevo Artículo</h4>
            </div>

            <div class="card-body p-5">

                <form id="formCrear" class="needs-validation" novalidate>

                    <h6 class="fw-bold mb-3">Identificación</h6>

                    <div class="row g-3 mb-4">
                        <div class="col-md-8">
                            <input name="nombre" class="form-control" placeholder="Nombre" required>
                        </div>

                        <div class="col-md-4">
                            <input name="codigo_pieza" class="form-control" placeholder="Código" required>
                        </div>
                    </div>

                    <h6 class="fw-bold mb-3">Stock</h6>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <input type="number" name="cantidad" class="form-control" placeholder="Cantidad" required>
                        </div>

                        <div class="col-md-4">
                            <input type="number" name="stock_minimo" class="form-control" placeholder="Stock mínimo"
                                required>
                        </div>

                        <div class="col-md-4">
                            <input name="ubicacion_almacen" class="form-control" placeholder="Ubicación" required>
                        </div>
                    </div>

                    <div class="text-end">
                        <button class="btn btn-success px-5">Guardar</button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script>

        document.getElementById("formCrear").addEventListener("submit", async e => {
            e.preventDefault();

            const form = e.target;

            if (!form.checkValidity()) {
                form.classList.add("was-validated");
                return;
            }

            const datos = Object.fromEntries(new FormData(form));

            await fetch("/inventario/api", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datos)
            });

            alert("Artículo guardado correctamente");

            window.location.href = "/inventario";
        });

    </script>

</body>

</html>
