<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .card {
            border-radius: 18px;
        }

        .btn-primary {
            background: #0d6efd;
            border: none;
        }
    </style>
</head>

<body>

    <div class="container my-5">

        <!-- breadcrumb -->
        <nav class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a th:href="@{/inventario}" class="text-decoration-none text-secondary">Inventario</a>
                </li>
                <li class="breadcrumb-item active">
                    Editar Producto #<span th:text="${inventario.id_repuesto}"></span>
                </li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-lg-10">

                <div class="card shadow border-0">

                    <!-- HEADER -->
                    <div class="card-header bg-white p-4 d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-circle me-3">
                                <i class="bi bi-pencil-square fs-4"></i>
                            </div>
                            <div>
                                <h4 class="fw-bold mb-0">Editar Producto</h4>
                                <small class="text-muted">Modificar datos y niveles de stock</small>
                            </div>
                        </div>

                        <div class="text-end">
                            <small class="text-muted">Código Interno</small>
                            <div class="fw-bold fs-5">
                                #<span th:text="${inventario.id_repuesto}"></span>
                            </div>
                        </div>
                    </div>

                    <!-- BODY -->
                    <div class="card-body p-5">

                        <form th:action="@{/inventario/actualizar/{id}(id=${inventario.id_repuesto})}"
                            th:object="${inventario}" method="post" class="needs-validation" novalidate>

                            <!-- IDENTIFICACION -->
                            <div class="card shadow-sm mb-4">
                                <div class="card-body">
                                    <h6 class="fw-bold text-secondary border-bottom pb-2 mb-3">
                                        Identificación del Producto
                                    </h6>

                                    <div class="row g-4">

                                        <div class="col-md-8">
                                            <label class="form-label fw-semibold">Nombre</label>
                                            <input type="text" th:field="*{nombre}" class="form-control form-control-lg"
                                                required>
                                        </div>

                                        <div class="col-md-4">
                                            <label class="form-label fw-semibold">Código Pieza</label>
                                            <input type="text" th:field="*{codigo_pieza}"
                                                class="form-control form-control-lg" required>
                                        </div>

                                    </div>
                                </div>
                            </div>

                            <!-- STOCK -->
                            <div class="card shadow-sm mb-4">
                                <div class="card-body">
                                    <h6 class="fw-bold text-secondary border-bottom pb-2 mb-3">
                                        Gestión de Stock
                                    </h6>

                                    <div class="row g-4">

                                        <div class="col-md-4">
                                            <label class="form-label fw-semibold">Cantidad</label>
                                            <input type="number" th:field="*{cantidad}" class="form-control" min="0"
                                                required>
                                        </div>

                                        <div class="col-md-4">
                                            <label class="form-label fw-semibold">Stock mínimo</label>
                                            <input type="number" th:field="*{stock_minimo}" class="form-control" min="0"
                                                required>
                                        </div>

                                        <div class="col-md-4">
                                            <label class="form-label fw-semibold">Ubicación</label>
                                            <input type="text" th:field="*{ubicacion_almacen}" class="form-control"
                                                required>
                                        </div>

                                    </div>
                                </div>
                            </div>

                            <!-- BOTONES -->
                            <div class="text-end">
                                <a th:href="@{/inventario}" class="btn btn-secondary me-2">
                                    Cancelar
                                </a>
                                <button class="btn btn-primary px-4">
                                    <i class="bi bi-save"></i> Guardar Cambios
                                </button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- VALIDACION -->
    <script>
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })();
    </script>

</body>

</html>
