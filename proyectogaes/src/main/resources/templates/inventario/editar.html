<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Producto | MaqGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 18px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }

        .breadcrumb-item+.breadcrumb-item::before {
            content: "›";
        }
    </style>
</head>

<body>

    <div class="container my-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb bg-white p-3 rounded-3 shadow-sm">
                <li class="breadcrumb-item"><a th:href="@{/inicio}" class="text-decoration-none">Inicio</a></li>
                <li class="breadcrumb-item"><a th:href="@{/inventario}" class="text-decoration-none">Inventario</a></li>
                <li class="breadcrumb-item active" aria-current="page">
                    Editar: <span class="fw-bold" th:text="${inventario.nombre}"></span>
                </li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow border-0 overflow-hidden">

                    <div class="card-header bg-white p-4 border-0 d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-circle me-3">
                                <i class="bi bi-pencil-square fs-4"></i>
                            </div>
                            <div>
                                <h4 class="fw-bold mb-0">Editar Producto</h4>
                                <small class="text-muted">ID de Registro: #<span
                                        th:text="${inventario.id_repuesto}"></span></small>
                            </div>
                        </div>
                        <div class="text-end d-none d-md-block">
                            <span class="badge bg-dark px-3 py-2">MODO EDICIÓN</span>
                        </div>
                    </div>

                    <div class="card-body p-4 p-md-5 bg-light">
                        <form th:action="@{/inventario/actualizar/{id}(id=${inventario.id_repuesto})}"
                            th:object="${inventario}" method="post" class="needs-validation" novalidate>

                            <input type="hidden" th:field="*{id_repuesto}" />

                            <div class="card border-0 shadow-sm mb-4">
                                <div class="card-body p-4">
                                    <h6 class="text-uppercase text-primary fw-bold mb-4"
                                        style="font-size: 0.8rem; letter-spacing: 1px;">
                                        <i class="bi bi-info-circle me-2"></i>Información General
                                    </h6>
                                    <div class="row g-3">
                                        <div class="col-md-8">
                                            <label class="form-label fw-semibold">Nombre del Repuesto</label>
                                            <input type="text" th:field="*{nombre}" class="form-control"
                                                placeholder="Ej. Filtro de Aceite" required>
                                            <div class="invalid-feedback">Por favor, ingrese un nombre.</div>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-semibold">Código de Pieza (REF)</label>
                                            <input type="text" th:field="*{codigo_pieza}" class="form-control"
                                                placeholder="Ej. FA-102" required>
                                            <div class="invalid-feedback">Ingrese el código de referencia.</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="card border-0 shadow-sm mb-4">
                                <div class="card-body p-4">
                                    <h6 class="text-uppercase text-primary fw-bold mb-4"
                                        style="font-size: 0.8rem; letter-spacing: 1px;">
                                        <i class="bi bi-boxes me-2"></i>Control de Almacén
                                    </h6>
                                    <div class="row g-3">
                                        <div class="col-md-4">
                                            <label class="form-label fw-semibold">Cantidad Actual</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-white"><i
                                                        class="bi bi-hash"></i></span>
                                                <input type="number" th:field="*{cantidad}" class="form-control" min="0"
                                                    required>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-semibold">Stock Mínimo (Alerta)</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-white"><i
                                                        class="bi bi-bell"></i></span>
                                                <input type="number" th:field="*{stock_minimo}" class="form-control"
                                                    min="0" required>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-semibold">Ubicación en Almacén</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-white"><i
                                                        class="bi bi-geo-alt"></i></span>
                                                <input type="text" th:field="*{ubicacion_almacen}" class="form-control"
                                                    placeholder="Ej. Estante A-1" required>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-5 p-3 border-top bg-white">
                                <a th:href="@{/inventario}" class="btn btn-link text-secondary text-decoration-none">
                                    <i class="bi bi-arrow-left me-1"></i> Volver al listado
                                </a>
                                <div>
                                    <button type="reset" class="btn btn-light me-2">Restablecer</button>
                                    <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                        <i class="bi bi-check-circle me-1"></i> Actualizar Producto
                                    </button>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>

</html>
