<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Inventario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/inventario.css}">
</head>

<body>

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"> Inventario Global</h2>

            <div class="d-flex gap-2">
                <a th:href="@{/inventario/exportar}" class="btn btn-success">
                    <i class="bi bi-file-earmark-excel"></i> Exportar
                </a>

                <a th:href="@{/inventario/nuevo}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Nuevo
                </a>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body">

                <table class="table table-hover align-middle">

                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Ubicación</th>
                            <th class="text-center">Stock</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="inv : ${inventario}">

                            <td>
                                <strong th:text="${inv.nombre}"></strong><br>
                                <small class="text-muted" th:text="'REF: ' + ${inv.codigo_pieza}"></small>
                            </td>

                            <td th:text="${inv.ubicacion_almacen}"></td>

                            <!-- Badge dinámico -->
                            <td class="text-center">
                                <span th:class="'badge ' + 
                            (${inv.cantidad} > 20 ? 'stock-alto' : 
                            (${inv.cantidad} > 5 ? 'stock-medio' : 'stock-bajo'))" th:text="${inv.cantidad}"></span>
                            </td>

                            <td class="text-end">
                                <a th:href="@{/inventario/editar/{id}(id=${inv.id_repuesto})}"
                                    class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <a th:href="@{/inventario/eliminar/{id}(id=${inv.id_repuesto})}"
                                    class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>

                        </tr>
                    </tbody>

                </table>

            </div>
        </div>

    </div>

</body>

</html>
