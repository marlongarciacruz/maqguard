<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Inventario | MaqGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Estilos para los Badges de Stock */
        .stock-alto {
            background-color: #198754;
            color: white;
        }

        /* Verde */
        .stock-medio {
            background-color: #fd7e14;
            color: white;
        }

        /* Naranja */
        .stock-bajo {
            background-color: #dc3545;
            color: white;
        }

        /* Rojo */

        /* Navbar y efectos (se mantienen de tu diseño) */
        .navbar-hover .nav-link {
            transition: all 0.3s;
        }

        .navbar-hover .nav-link:hover {
            color: #fff !important;
            transform: translateY(-2px);
        }

        .hover-link:hover {
            color: #fff !important;
            transform: translateX(5px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3"
        style="background-color:#4B4F54; border-bottom:3px solid #f97316;">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center me-5" th:href="@{/inicio}">
                <div class="bg-white rounded-circle p-1 me-2 d-flex align-items-center justify-content-center"
                    style="width: 45px; height: 45px;">
                    <img th:src="@{/assets/maqguard-icon.png}" width="32" height="32" alt="Logo">
                </div>
                <span class="fw-bold text-white">MAQGUARD</span>
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-box-seam me-2"></i>Inventario Global</h2>
            <div class="d-flex gap-2">
                <a th:href="@{/inventario/exportar}" class="btn btn-outline-success">
                    <i class="bi bi-file-earmark-excel me-1"></i> Exportar
                </a>
                <a th:href="@{/inventario/nuevo}" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i> Nuevo Repuesto
                </a>
            </div>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-4">Producto / Referencia</th>
                                <th>Ubicación</th>
                                <th class="text-center">Stock Actual</th>
                                <th class="text-center">Stock Mínimo</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(inventario)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="bi bi-info-circle fs-2 d-block mb-2"></i>
                                    No hay repuestos registrados en el inventario.
                                </td>
                            </tr>

                            <tr th:each="inv : ${inventario}">
                                <td class="ps-4">
                                    <div class="fw-bold text-dark" th:text="${inv.nombre}">Nombre</div>
                                    <small class="text-muted" th:text="${'REF: ' + inv.codigo_pieza}"></small>
                                </td>
                                <td>
                                    <i class="bi bi-geo-alt text-secondary me-1"></i>
                                    <span th:text="${inv.ubicacion_almacen}"></span>
                                </td>
                                <td class="text-center">
                                    <span th:class="'badge rounded-pill p-2 px-3 ' + 
                                        (${inv.cantidad} > 20 ? 'stock-alto' : 
                                        (${inv.cantidad} > ${inv.stock_minimo} ? 'stock-medio' : 'stock-bajo'))"
                                        th:text="${inv.cantidad}">0</span>
                                </td>
                                <td class="text-center text-muted" th:text="${inv.stock_minimo}">0</td>
                                <td class="text-end pe-4">
                                    <div class="btn-group">
                                        <a th:href="@{/inventario/editar/{id}(id=${inv.id_repuesto})}"
                                            class="btn btn-sm btn-outline-warning" title="Editar">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                        <a th:href="@{/inventario/eliminar/{id}(id=${inv.id_repuesto})}"
                                            class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('¿Estás seguro de eliminar este artículo?')"
                                            title="Eliminar">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
