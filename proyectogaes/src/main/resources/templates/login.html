<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión | MaqGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-bg">

    <a th:href="@{/}" class="btn-back">
        <i class="bi bi-arrow-left"></i> Volver al inicio
    </a>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrapper">
                <img th:src="@{/assets/maqguard-icon.png}" alt="Logo">
            </div>

            <h2 class="text-center fw-bold mb-1 mt-3 text-white">MaqGuard</h2>
            <p class="text-center text-white-50 mb-4 small">Panel de Control Industrial</p>

            <div th:if="${param.error}" class="alert-custom error animate-fade">
                Usuario o contraseña incorrectos
            </div>
            <div th:if="${param.logout}" class="alert-custom success animate-fade" id="logoutMsg">
                Sesión cerrada correctamente
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="input-group-custom mb-3">
                    <i class="bi bi-person text-orange"></i>
                    <input type="text" name="username" placeholder="Usuario" required autocomplete="off">
                </div>

                <div class="input-group-custom mb-4">
                    <i class="bi bi-lock text-orange"></i>
                    <input type="password" name="password" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn-login-main">
                    Ingresar <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-0" style="font-size: 0.75rem;">© 2026 MaqGuard Industrial Solutions</p>
            </div>
        </div>
    </div>

    <script>
        // Script para remover el mensaje de logout
        setTimeout(() => {
            const msg = document.getElementById("logoutMsg");
            if (msg) {
                msg.style.opacity = "0";
                setTimeout(() => msg.remove(), 600);
            }
        }, 3000);
    </script>
</body>
</html>
