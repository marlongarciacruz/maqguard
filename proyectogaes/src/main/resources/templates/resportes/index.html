<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fallas</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Gestión de Fallas</h2>

    <a href="/falla/crear" class="btn btn-primary mb-3">Nuevo Reporte</a>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>Título</th>
            <th>Prioridad</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reportes}">
            <td th:text="${r.titulo}"></td>
            <td th:text="${r.prioridad}"></td>
            <td th:text="${r.estado}"></td>
            <td>
                <a th:href="@{'/falla/ver/' + ${r.idFalla}}" class="btn btn-sm btn-info">Ver</a>
                <a th:href="@{'/falla/editar/' + ${r.idFalla}}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{'/falla/eliminar/' + ${r.idFalla}}" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
