<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mis Mantenimientos - MaqGuard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
</head>
<body>

<!--
╔══════════════════════════════════════════════════════════════╗
║  EQUIVALENTE A: Views/mismantenimientos/mismantenimientos.php ║
║  CONTROLLER:    GET /tecnico/mismantenimientos               ║
║  DATOS:         mantenimientos (List<MantenimientoDTO>)      ║
╚══════════════════════════════════════════════════════════════╝
-->

<div class="container my-5">
    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-success text-white py-3 rounded-top-4">
            <h4 class="mb-0">
                <i class="bi bi-tools me-2"></i>Mis Tareas de Mantenimiento Asignadas
            </h4>
        </div>

        <div class="card-body bg-light p-4">

            <!-- Alertas flash ── PHP: session()->getFlashdata('success') -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

            <!-- Sin mantenimientos ── PHP: if (empty($mantenimientos_asignados)) -->
            <div th:if="${#lists.isEmpty(mantenimientos)}"
                 class="alert alert-info text-center" role="alert">
                <i class="bi bi-info-circle-fill me-2"></i>
                Felicidades, no tienes mantenimientos pendientes asignados.
            </div>

            <!-- Tabla ── PHP: foreach ($mantenimientos_asignados as $mantenimiento) -->
            <div th:unless="${#lists.isEmpty(mantenimientos)}" class="table-responsive">
                <table class="table table-striped table-hover rounded-3 overflow-hidden shadow-sm align-middle">
                    <thead class="bg-dark text-white">
                        <tr>
                            <th>Máquina Asignada</th>
                            <th>Ubicación</th>
                            <th>Descripción de la Tarea</th>
                            <th>Fecha Programada</th>
                            <th>Costo Estimado</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${mantenimientos}">

                            <!-- PHP: esc($mantenimiento['nombre']) / esc($mantenimiento['modelo']) -->
                            <td>
                                <span th:text="${m.nombreMaquina}">Máquina</span>
                                <br/>
                                <span class="text-muted small">
                                    Modelo: <span th:text="${m.modeloMaquina}">-</span>
                                </span>
                            </td>

                            <!-- PHP: esc($mantenimiento['ubicacion_maquina']) -->
                            <td th:text="${m.ubicacionMaquina}">Ubicación</td>

                            <!-- PHP: esc($mantenimiento['descripcion_trabajo']) -->
                            <td th:text="${m.descripcionTrabajo}">Descripción</td>

                            <!-- PHP: esc($mantenimiento['fecha_mantenimiento']) como badge -->
                            <td>
                                <span class="badge bg-primary fs-6"
                                      th:text="${#temporals.format(m.fechaMantenimiento, 'yyyy-MM-dd')}">
                                    Fecha
                                </span>
                            </td>

                            <!-- PHP: number_format($mantenimiento['costo_mantenimiento'], 0, ',', '.') -->
                            <td>
                                $<span th:text="${#numbers.formatDecimal(m.costoMantenimiento, 0, 'COMMA', 0, 'POINT')}">0</span>
                            </td>

                            <!-- PHP: badge amarillo si Pendiente, azul si otro estado -->
                            <td>
                                <span th:text="${m.estado}"
                                      th:class="${m.estado == 'Pendiente'} ? 'badge bg-warning text-dark' : 'badge bg-info'">
                                    Estado
                                </span>
                            </td>

                            <!-- PHP: base_url('/mantenimientos/iniciar/' . $mantenimiento['id_mantenimiento']) -->
                            <td>
                                <a th:href="@{/tecnico/mismantenimientos/{id}/iniciar(id=${m.idMantenimiento})}"
                                   class="btn btn-sm btn-success rounded-pill shadow-sm"
                                   title="Iniciar Trabajo">
                                    <i class="bi bi-play-circle-fill me-1"></i> Iniciar Mantenimiento
                                </a>
                            </td>

                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
