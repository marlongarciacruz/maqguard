<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">

    <!-- Miga de pan -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/usuarios}" class="text-decoration-none text-secondary">Usuarios</a>
            </li>
            <li class="breadcrumb-item active">Nuevo Registro</li>
        </ol>
    </nav>

    <!-- Alerta de error -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

                <!-- Cabecera -->
                <div class="card-header bg-white py-4 px-5 border-bottom">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-circle me-3">
                            <i class="bi bi-person-plus-fill fs-4"></i>
                        </div>
                        <div>
                            <h4 class="fw-bold text-dark mb-0">Registrar Nuevo Usuario</h4>
                            <p class="text-muted small mb-0">Cree una cuenta de acceso para el personal.</p>
                        </div>
                    </div>
                </div>

                <div class="card-body p-5 bg-light">

                    <!-- ✅ FORMULARIO CORREGIDO: sin th:object ni th:field -->
                    <form th:action="@{/usuarios/guardar}" method="post" class="needs-validation" novalidate>

                        <!-- SECCIÓN 1 -->
                        <div class="card border-0 shadow-sm rounded-4 mb-4">
                            <div class="card-body p-4">
                                <h6 class="fw-bold text-secondary mb-3 border-bottom pb-2">1. Identidad del Usuario</h6>

                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Nombre Completo</label>
                                        <!-- ✅ name="nombre" coincide con @RequestParam String nombre -->
                                        <input type="text" name="nombre" required class="form-control" placeholder="Ej: Juan Pérez">
                                        <div class="invalid-feedback">Ingrese el nombre completo.</div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Nombre de Usuario</label>
                                        <!-- ✅ name="usuario" coincide con @RequestParam String usuario -->
                                        <input type="text" name="usuario" required class="form-control" placeholder="Ej: jperez24">
                                        <div class="invalid-feedback">Ingrese el nombre de usuario.</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- SECCIÓN 2 -->
                        <div class="card border-0 shadow-sm rounded-4 mb-4">
                            <div class="card-body p-4">
                                <h6 class="fw-bold text-secondary mb-3 border-bottom pb-2">2. Credenciales y Permisos</h6>

                                <div class="row g-4">

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Contraseña</label>
                                        <!-- ✅ name="password" coincide con @RequestParam String password -->
                                        <input type="password" name="password" required class="form-control">
                                        <div class="invalid-feedback">Ingrese una contraseña.</div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Rol</label>
                                        <!-- ✅ name="id_rol" coincide con @RequestParam String id_rol -->
                                        <!-- ✅ Carga dinámica desde BD con th:each -->
                                        <select name="id_rol" class="form-select" required>
                                            <option value="">Seleccione rol...</option>
                                            <option th:each="rol : ${roles}"
                                                    th:value="${rol.id}"
                                                    th:text="${rol.descripcionRol}">
                                            </option>
                                        </select>
                                        <div class="invalid-feedback">Seleccione un rol.</div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Estado</label>
                                        <!-- ✅ name="estado" coincide con @RequestParam String estado -->
                                        <select name="estado" class="form-select">
                                            <option value="Activo">Activo</option>
                                            <option value="Inactivo">Inactivo</option>
                                        </select>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <!-- BOTONES -->
                        <div class="d-flex justify-content-end gap-3">
                            <a th:href="@{/usuarios}" class="btn btn-secondary">
                                <i class="bi bi-x-lg me-1"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg me-1"></i> Crear Usuario
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(() => {
    'use strict'
    const forms = document.querySelectorAll('.needs-validation')
    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            }
            form.classList.add('was-validated')
        }, false)
    })
})()
</script>

</body>
</html>
