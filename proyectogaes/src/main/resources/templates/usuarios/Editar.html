<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/usuarios}" class="text-decoration-none text-secondary">Usuarios</a>
            </li>
            <li class="breadcrumb-item active">Editar Perfil</li>
        </ol>
    </nav>

    <!-- Alerta de error -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

                <!-- CABECERA -->
                <div class="card-header bg-white py-4 px-5 border-bottom d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-circle me-3">
                            <i class="bi bi-person-gear fs-4"></i>
                        </div>
                        <div>
                            <h4 class="fw-bold text-dark mb-0">Editar Usuario</h4>
                            <p class="text-muted small mb-0">Actualice las credenciales y permisos de acceso.</p>
                        </div>
                    </div>

                    <!-- ✅ ID usando th:text directo, sin th:object -->
                    <div class="text-end">
                        <small class="text-muted text-uppercase fw-bold" style="font-size: 0.65rem;">ID Sistema</small>
                        <div class="font-monospace fw-bold fs-5 text-dark"
                             th:text="'#' + ${usuario.id}"></div>
                    </div>
                </div>

                <div class="card-body p-5 bg-light">

                    <!-- ✅ FORM CORREGIDO: sin th:object, action usa ${usuario.id} directamente -->
                    <form th:action="@{/usuarios/actualizar/{id}(id=${usuario.id})}"
                          method="post"
                          class="needs-validation" novalidate>

                        <!-- SECCIÓN 1 -->
                        <div class="card border-0 shadow-sm rounded-4 mb-4">
                            <div class="card-body p-4">
                                <h6 class="fw-bold text-secondary mb-3 border-bottom pb-2">1. Información Personal</h6>

                                <div class="row g-4">

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Nombre Completo</label>
                                        <!-- ✅ name="nombre" + th:value para precargar el valor -->
                                        <input type="text" name="nombre"
                                               th:value="${usuario.nombre}"
                                               required class="form-control">
                                        <div class="invalid-feedback">Ingrese el nombre completo.</div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Usuario</label>
                                        <!-- ✅ name="usuario" + th:value para precargar el valor -->
                                        <input type="text" name="usuario"
                                               th:value="${usuario.username}"
                                               required class="form-control">
                                        <div class="invalid-feedback">Ingrese el nombre de usuario.</div>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <!-- SECCIÓN 2 -->
                        <div class="card border-0 shadow-sm rounded-4 mb-4">
                            <div class="card-body p-4">
                                <h6 class="fw-bold text-secondary mb-3 border-bottom pb-2">2. Permisos y Acceso</h6>

                                <div class="row g-4">

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Rol</label>
                                        <!-- ✅ name="id_rol" + th:selected para marcar el rol actual -->
                                        <select name="id_rol" class="form-select" required>
                                            <option th:each="rol : ${roles}"
                                                    th:value="${rol.id}"
                                                    th:text="${rol.descripcionRol}"
                                                    th:selected="${usuario.rol != null and usuario.rol.id == rol.id}">
                                            </option>
                                        </select>
                                        <div class="invalid-feedback">Seleccione un rol.</div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Estado</label>
                                        <!-- ✅ name="estado" + th:selected para marcar el estado actual -->
                                        <select name="estado" class="form-select" required>
                                            <option value="Activo"
                                                    th:selected="${usuario.estado == 'Activo'}">Activo</option>
                                            <option value="Inactivo"
                                                    th:selected="${usuario.estado == 'Inactivo'}">Inactivo</option>
                                        </select>
                                        <div class="invalid-feedback">Seleccione un estado.</div>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <!-- BOTONES -->
                        <div class="d-flex justify-content-end gap-3">
                            <a th:href="@{/usuarios}" class="btn btn-secondary">
                                <i class="bi bi-x-lg me-1"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle-fill me-1"></i> Guardar Cambios
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(() => {
    'use strict'
    const forms = document.querySelectorAll('.needs-validation')
    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            }
            form.classList.add('was-validated')
        }, false)
    })
})()
</script>

</body>
</html>
